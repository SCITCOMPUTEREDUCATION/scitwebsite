<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Certificate | SCIT</title>
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; padding: 0; background: #ffffff; color: #4a0404; 
            display: flex; flex-direction: column; min-height: 100vh;
        }

        /* Watermark */
        body::before {
            content: ""; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%); width: 450px; height: 450px;
            background: url('LOGO.jpg') no-repeat center center;
            background-size: contain; opacity: 0.05; z-index: -1;
        }

        nav { 
            background: white; display: flex; justify-content: center; 
            position: sticky; top: 0; z-index: 1000; border-bottom: 2px solid #4a0404; 
        }
        nav a { 
            color: #4a0404; text-decoration: none; padding: 15px 25px; 
            font-weight: 800; font-size: 0.9rem; text-transform: uppercase;
        }

        .container { flex: 1; max-width: 700px; margin: 40px auto; padding: 0 20px; text-align: center; }

        .verify-card {
            background: #fdf2f2; padding: 30px; border-radius: 20px;
            border: 1px solid #ddd; border-top: 10px solid #4a0404;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        input[type="text"] {
            width: 80%; padding: 12px; font-size: 1.1rem; border: 2px solid #4a0404;
            border-radius: 8px; margin-bottom: 20px; text-align: center; font-weight: bold;
        }

        .btn-verify {
            background: #4a0404; color: white; border: none; padding: 12px 40px;
            font-size: 1rem; font-weight: 700; border-radius: 8px; cursor: pointer;
            text-transform: uppercase; transition: 0.3s;
        }

        /* Result Table Design */
        #result { margin-top: 30px; display: none; text-align: left; animation: fadeIn 0.5s; }
        .status-box { padding: 20px; border-radius: 10px; border: 2px solid; }
        .valid { background: #e7f4e9; color: #155724; border-color: #c3e6cb; }
        .invalid { background: #f8d7da; color: #721c24; border-color: #f5c6cb; }

        .data-table { width: 100%; margin-top: 15px; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
        .data-table td { padding: 12px; border: 1px solid #ddd; font-weight: 600; color: #333; }
        .label { background: #f8f8f8; color: #4a0404; width: 40%; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
        footer { background: #4a0404; color: white; text-align: center; padding: 25px 20px; margin-top: auto; }
    </style>
</head>
<body>

    <nav>
    <a href="index.html">HOME</a> 
    <a href="courses.html">COURSE</a>
    <a href="certificate.html">CERTIFICATE</a>
    <a href="media.html">MEDIA</a>
    <a href="contact.html">CONTACT</a>
</nav>

    <div class="container">
        <div class="verify-card">
            <h2 style="text-transform: uppercase; margin-top: 0;">Online Verification</h2>
            <p>Enter Certificate Number to check student details:</p>
            
            <input type="text" id="certNo" placeholder="Enter Reg. No (e.g. SCIT/1001)"> <br>
            <button class="btn-verify" onclick="checkCertificate()">Verify Now</button>

            <div id="result"></div>
        </div>
    </div>

   <script>
    // --- YAHAN APNA GOOGLE SHEET CSV LINK DALIE ---
    const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR9zIi7L843P-vODgmS0y7Iy9fygN5vpnqxiOD2U8X9hOGuc7aBPVC9id-jc1khsPOXgg2cluIB-YVF/pub?output=csv"; 

    async function checkCertificate() {
        const input = document.getElementById("certNo").value.trim().toUpperCase();
        const resultDiv = document.getElementById("result");
        
        if (input === "") {
            alert("Please enter a Registration Number!");
            return;
        }

        resultDiv.style.display = "block";
        resultDiv.innerHTML = "<p style='text-align:center;'>Searching Database...</p>";

        try {
            const response = await fetch(sheetURL);
            const data = await response.text();
            
            // CSV data ko rows mein convert karna
            const rows = data.split("\n").map(row => row.split(","));
            
            // Student dhoondhna (Pehla Column = Reg No)
            const student = rows.find(r => r[0].trim().toUpperCase() === input);

            if (student) {
                resultDiv.innerHTML = `
                    <div class="status-box valid">
                        <h3 style="margin:0; text-align:center;">✅ VERIFIED & VALID</h3>
                        <table class="data-table">
                            <tr><td class="label">Student Name</td><td>${student[1]}</td></tr>
                            <tr><td class="label">Reg. Number</td><td>${student[0]}</td></tr>
                            <tr><td class="label">Course Name</td><td>${student[2]}</td></tr>
                            <tr><td class="label">Percentage</td><td>${student[3]}</td></tr>
                            <tr><td class="label">Final Grade</td><td>${student[4]}</td></tr>
                        </table>
                    </div>
                `;
            } else {
                resultDiv.innerHTML = `
                    <div class="status-box invalid">
                        <h3 style="margin:0; text-align:center;">❌ NOT FOUND</h3>
                        <p style="text-align:center;">Certificate Number <b>${input}</b> record mein nahi mila.</p>
                    </div>
                `;
            }
        } catch (error) {
            resultDiv.innerHTML = "<p style='color:red;'>Error connecting to Database. Please check your internet.</p>";
        }
    }
</script>

</body>
</html>
